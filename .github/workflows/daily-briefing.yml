name: Daily Macro Briefing

on:
  workflow_dispatch:
  schedule:
    # 9:00 AM ET during EDT (Mar–Nov). Change to '0 14 * * *' during EST (Nov–Mar).
    - cron: '0 13 * * *'

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install nodemailer rss-parser

      - name: Generate briefing and send email
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          BRIEFING_TO: ${{ secrets.BRIEFING_TO }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        run: node automation/github-actions/daily-briefing.mjs

      - name: Commit updated Obsidian notes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "briefing: auto-update ${{ github.run_id }}"
          file_pattern: '00 - Home/Latest Daily Briefing.md 01 - Daily Briefings/*.md'
