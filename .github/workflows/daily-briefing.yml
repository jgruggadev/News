name: Daily Macro Briefing

on:
  workflow_dispatch:  # manual trigger only — daily schedule handled by Cowork cron job

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install nodemailer rss-parser

      - name: Generate briefing and send email
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASS:     ${{ secrets.SMTP_PASS }}
          SMTP_FROM:     ${{ secrets.SMTP_FROM }}
          BRIEFING_TO:   ${{ secrets.BRIEFING_TO }}
        run: node automation/github-actions/daily-briefing.mjs

      - name: Commit updated Obsidian notes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "briefing: daily macro update"
          file_pattern: "00 - Home/Latest Daily Briefing.md 01 - Daily Briefings/*.md"
          commit_user_name: "Daily Briefing Bot"
          commit_user_email: "briefing-bot@users.noreply.github.com"
