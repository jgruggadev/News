<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kelley News Briefing Endpoint</title>
  <style>
    body { margin: 0; font-family: Georgia, 'Times New Roman', serif; background: #f4f0e8; color: #161616; }
    main { max-width: 820px; margin: 72px auto; padding: 0 24px; }
    h1 { font-size: 42px; font-weight: 500; margin: 0 0 12px; }
    p, li { font-size: 18px; line-height: 1.6; }
    code { background: #fff; border: 1px solid #d6cbbb; padding: 2px 5px; }
    .box { background: #fffdf8; border: 1px solid #d6cbbb; padding: 20px; margin-top: 22px; }
  </style>
</head>
<body>
  <main>
    <h1>Kelley News Briefing Endpoint</h1>
    <p>This deployment is live. The homepage is only a status page; cron should call the private API endpoint.</p>
    <div class="box">
      <h2>Health Check</h2>
      <p>Open <code>/api/health</code> to confirm the API is reachable.</p>
    </div>
    <div class="box">
      <h2>Cron Target</h2>
      <p>Use <code>/api/daily-briefing?key=YOUR_CRON_SECRET</code> as the cron URL.</p>
    </div>
  </main>
</body>
</html>
